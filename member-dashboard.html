<!-- Update member dashboard with data-i18n attributes -->
<div class="welcome-card">
    <h1><span data-i18n="member.welcome">Welcome back,</span> <span id="welcomeName">Student</span>!</h1>
    <p><span data-i18n="member.next_class">Your next class:</span> Mathematics (Online) - Tomorrow at 4:00 PM</p>
</div>

<div class="dashboard-grid">
    <!-- Current Classes -->
    <div class="dashboard-card">
        <h3><i class="fas fa-book-open"></i> <span data-i18n="member.my_classes">My Classes</span></h3>
        <div id="myClasses">
            <div class="class-item">
                <div>
                    <strong data-i18n="subjects.math">Mathematics</strong>
                    <p style="color: var(--gray-color);" data-i18n="enroll.form4">Form 4 - Online</p>
                </div>
                <span style="color: var(--success-color);" data-i18n="member.active">Active</span>
            </div>
        </div>
    </div>
    
    <!-- Payment Information -->
    <div class="dashboard-card">
        <h3><i class="fas fa-credit-card"></i> <span data-i18n="member.payment_status">Payment Status</span></h3>
        <div style="margin-bottom: 20px;">
            <p style="color: var(--gray-color);" data-i18n="member.monthly_fee">Monthly Fee</p>
            <h2 style="color: var(--dark-color);">RM 290</h2>
            <p style="color: var(--gray-color);" data-i18n="member.due_date">Due Date: 5th of each month</p>
        </div>
        <button class="btn-make-payment" onclick="makePayment()" data-i18n="member.make_payment">
            <i class="fas fa-lock"></i> Make Payment with ToyibPay
        </button>
        
        <div class="payment-history">
            <h4 data-i18n="member.recent_payments">Recent Payments</h4>
            <div class="payment-item">
                <span>January 2024</span>
                <span style="color: var(--success-color);" data-i18n="member.paid">Paid</span>
            </div>
        </div>
    </div>
</div>
