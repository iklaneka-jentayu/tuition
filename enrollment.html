<!-- Update the form fields in enrollment.html with data-i18n attributes -->
<div class="form-group">
    <label for="fullName" data-i18n="enroll.full_name">Full Name *</label>
    <input type="text" id="fullName" name="fullName" class="form-control" 
           data-i18n-placeholder="enroll.full_name" required>
</div>

<div class="form-group">
    <label for="email" data-i18n="enroll.email">Email Address *</label>
    <input type="email" id="email" name="email" class="form-control" 
           data-i18n-placeholder="enroll.email" required>
</div>

<div class="form-group">
    <label for="phone" data-i18n="enroll.phone">Phone Number *</label>
    <input type="tel" id="phone" name="phone" class="form-control" 
           data-i18n-placeholder="enroll.phone" required>
</div>

<div class="form-group">
    <label for="form" data-i18n="enroll.form">Current Form/Year *</label>
    <select id="form" name="form" class="form-control" required>
        <option value="" data-i18n="enroll.select_form">Select Form</option>
        <option value="1" data-i18n="enroll.form1">Form 1</option>
        <option value="2" data-i18n="enroll.form2">Form 2</option>
        <option value="3" data-i18n="enroll.form3">Form 3</option>
        <option value="4" data-i18n="enroll.form4">Form 4</option>
        <option value="5" data-i18n="enroll.form5">Form 5</option>
    </select>
</div>

<!-- Update payment section -->
<div class="payment-section">
    <h2 data-i18n="enroll.payment_details">Payment Details</h2>
    
    <div class="total-amount">
        <span data-i18n="enroll.total_monthly">Total Monthly Fee:</span>
        <span id="totalAmount">RM 0</span>
    </div>
    
    <div class="form-group">
        <label data-i18n="enroll.select_payment">Select Payment Method</label>
        <div class="payment-methods">
            <div class="payment-method active" data-method="toyibpay">
                <img src="https://toyibpay.com/assets/logo.png" alt="ToyibPay" 
                     data-i18n-alt="enroll.toyibpay">
                <h4 data-i18n="enroll.toyibpay">ToyibPay</h4>
                <p data-i18n="enroll.toyibpay_desc">Secure online payment</p>
            </div>
        </div>
    </div>
    
    <button type="submit" class="btn-payment" data-i18n="enroll.pay_button">
        <i class="fas fa-lock"></i> Pay with ToyibPay
    </button>
    
    <p style="margin-top: 15px; font-size: 0.9rem; color: var(--gray-color); text-align: center;"
       data-i18n="enroll.terms_agree">
        By enrolling, you agree to our Terms of Service and Privacy Policy.
    </p>
</div>
