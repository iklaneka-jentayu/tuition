<!DOCTYPE html>
<html>
<head>
  <title>Google Auth Form</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
       body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        form {
            margin-bottom: 20px;
        }

        input, button {
            padding: 8px;
            margin: 5px 0;
            width: 250px;
        }

        table {
            border-collapse: collapse;
            margin-top: 20px;
            width: 100%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        th {
            background: #f4f4f4;
        }
    </style>
</head>
<body>

<h2>Submit Form (Google Login Required)</h2>

<div id="g_id_onload"
     data-client_id="220971531524-tf7drli4bomnh24r5fh30kdf16bc4php.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"></div>

<br>

<form id="myForm">
  <input type="text" id="name" placeholder="Name" required><br><br>
  <input type="text" id="phone" placeholder="Phone" required><br><br>
  <textarea id="message" placeholder="Message"></textarea><br><br>
  <button type="submit">Submit</button>
</form>

<h3>Submitted Data</h3>
<button onclick="loadData()">Load Data</button>

<table id="dataTable">
    <thead>
        <tr>
            <th>Date</th>
            <th>Email</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Message</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>



<script>

let userToken = "123raz";

function handleCredentialResponse(response) {
  userToken = response.credential;
  alert("Logged in successfully!");
}

document.getElementById("myForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  if (!userToken) {
    alert("Please login first!");
    return;
  }

  const data = {
    token: userToken,
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    message: document.getElementById("message").value
  };

  const res = await fetch("https://script.google.com/macros/s/AKfycbzOH-ci4s4E5m_koze6z6BJtVzU7sNOtAW0ft1k4K-403TYc4UfenB9GPgjef4X5V3L/exec", {
    method: "POST",
    mode: 'no-cors',
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const result = await res.json();

  if (result.success) {
    alert("Data saved successfully!");
    document.getElementById("myForm").reset();
  } else {
    alert("Error: " + result.error);
  }
});

async function loadData() {

  if (!userToken) {
    alert("Login first!");
    return;
  }

  //{'mode': 'no-cors'}
  const res = await fetch(
    "https://script.google.com/macros/s/AKfycbzOH-ci4s4E5m_koze6z6BJtVzU7sNOtAW0ft1k4K-403TYc4UfenB9GPgjef4X5V3L/exec?token=" + userToken
  );

  const result = await res.json();

  console.log('result-',result);
    //alert(result);

    const tbody = document.querySelector("#dataTable tbody");
    tbody.innerHTML = "";

    result.data.forEach(row => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row.date}</td>
            <td>${row.email}</td>
            <td>${row.name}</td>
            <td>${row.phone}</td>
            <td>${row.Mmessage}</td>
        `;

        tbody.appendChild(tr);
    });

  if (result.success) {
    console.log(result.data);
  } else {
    alert(result.error);
  }
}

</script>

</body>
</html>
