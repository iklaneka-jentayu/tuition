<!-- Update admin dashboard header -->
<div class="admin-header">
    <h1 data-i18n="admin.title">Admin Dashboard</h1>
    <button class="btn-primary" onclick="syncData()">
        <i class="fas fa-sync"></i> <span data-i18n="admin.sync">Sync Data</span>
    </button>
</div>

<!-- Statistics Cards -->
<div class="admin-stats">
    <div class="stat-card">
        <div class="stat-icon">
            <i class="fas fa-users"></i>
        </div>
        <div class="stat-info">
            <h3 data-i18n="admin.total_members">Total Members</h3>
            <p id="totalMembers">0</p>
        </div>
    </div>
    <!-- More stat cards... -->
</div>

<!-- Admin Tabs -->
<div class="admin-tabs">
    <button class="admin-tab active" onclick="switchTab('members')" 
            data-i18n="admin.tab_members">Members</button>
    <button class="admin-tab" onclick="switchTab('payments')" 
            data-i18n="admin.tab_payments">Payments</button>
    <button class="admin-tab" onclick="switchTab('logs')" 
            data-i18n="admin.tab_logs">System Logs</button>
    <button class="admin-tab" onclick="switchTab('settings')" 
            data-i18n="admin.tab_settings">Settings</button>
    <button class="admin-tab" onclick="switchTab('subjects')" 
            data-i18n="admin.tab_subjects">Subjects</button>
    <button class="admin-tab" onclick="switchTab('reports')" 
            data-i18n="admin.tab_reports">Reports</button>
</div>

<!-- Members Panel with translations -->
<div id="membersPanel" class="admin-panel">
    <div class="panel-header">
        <h2 data-i18n="admin.members.title">Manage Members</h2>
        <div class="search-box">
            <input type="text" id="memberSearch" data-i18n-placeholder="admin.members.search">
            <button class="btn-primary" onclick="searchMembers()">
                <i class="fas fa-search"></i>
            </button>
        </div>
        <button class="btn-add" onclick="showAddMemberModal()">
            <i class="fas fa-plus"></i> <span data-i18n="admin.members.add">Add Member</span>
        </button>
    </div>
    
    <table class="data-table">
        <thead>
            <tr>
                <th data-i18n="admin.members.id">Member ID</th>
                <th data-i18n="admin.members.name">Name</th>
                <th data-i18n="admin.members.email">Email</th>
                <th data-i18n="admin.members.phone">Phone</th>
                <th data-i18n="admin.members.subjects">Subjects</th>
                <th data-i18n="admin.members.type">Type</th>
                <th data-i18n="admin.members.status">Status</th>
                <th data-i18n="admin.members.actions">Actions</th>
            </tr>
        </thead>
        <tbody id="membersTableBody"></tbody>
    </table>
</div>
